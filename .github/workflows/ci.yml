name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify repo structure
        run: |
          test -f frontend/package.json
          test -f services/auth/package.json
          test -f services/cars/requirements.txt
          test -f infra/terraform/main.tf

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install auth dependencies
        working-directory: services/auth
        run: npm ci

      - name: Run auth tests
        working-directory: services/auth
        env:
          NODE_ENV: test
          AUTH_USE_INMEMORY: "true"
        run: npm test

      - name: Install cars dependencies
        working-directory: services/cars
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

