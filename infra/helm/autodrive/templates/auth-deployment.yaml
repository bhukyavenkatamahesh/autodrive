{{- if .Values.auth.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "autodrive.fullname" . }}-auth
  labels:
    {{- include "autodrive.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
spec:
  replicas: {{ .Values.auth.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "autodrive.name" . }}
      app.kubernetes.io/component: auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "autodrive.name" . }}
        app.kubernetes.io/component: auth
    spec:
      containers:
        - name: auth
          image: {{ include "autodrive.image" (dict "root" . "svc" .Values.auth) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.auth.port }}
          env:
            - name: PORT
              value: {{ .Values.auth.port | quote }}
          envFrom:
            - secretRef:
                name: {{ include "autodrive.fullname" . }}-shared
          resources:
            {{- toYaml .Values.auth.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.auth.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.auth.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
{{- end }}
