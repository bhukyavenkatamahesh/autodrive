{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "autodrive.fullname" . }}-frontend
  labels:
    {{- include "autodrive.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "autodrive.name" . }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "autodrive.name" . }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: {{ include "autodrive.image" (dict "root" . "svc" .Values.frontend) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
          env:
            - name: PORT
              value: {{ .Values.frontend.port | quote }}
            - name: NODE_ENV
              value: production
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
{{- end }}
