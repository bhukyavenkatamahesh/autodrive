{{- if .Values.reviews.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "autodrive.fullname" . }}-reviews
  labels:
    {{- include "autodrive.labels" . | nindent 4 }}
    app.kubernetes.io/component: reviews
spec:
  replicas: {{ .Values.reviews.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "autodrive.name" . }}
      app.kubernetes.io/component: reviews
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "autodrive.name" . }}
        app.kubernetes.io/component: reviews
    spec:
      containers:
        - name: reviews
          image: {{ include "autodrive.image" (dict "root" . "svc" .Values.reviews) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.reviews.port }}
          env:
            - name: PORT
              value: {{ .Values.reviews.port | quote }}
            - name: SENTIMENT_API_URL
              value: {{ .Values.reviews.sentimentApiUrl | quote }}
          envFrom:
            - secretRef:
                name: {{ include "autodrive.fullname" . }}-shared
          resources:
            {{- toYaml .Values.reviews.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.reviews.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.reviews.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
{{- end }}
