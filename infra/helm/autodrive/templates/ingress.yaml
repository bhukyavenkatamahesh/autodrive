{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "autodrive.fullname" . }}
  labels:
    {{- include "autodrive.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    {{- $hasHost := ne .Values.ingress.host "" }}
    - {{ if $hasHost }}host: {{ .Values.ingress.host | quote }}
      {{ end }}http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: {{ include "autodrive.fullname" . }}-auth
                port:
                  number: {{ .Values.auth.port }}
          - path: /cars
            pathType: Prefix
            backend:
              service:
                name: {{ include "autodrive.fullname" . }}-cars
                port:
                  number: {{ .Values.cars.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "autodrive.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
{{- end }}
