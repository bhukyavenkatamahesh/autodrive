{{- if .Values.auth.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "autodrive.fullname" . }}-auth
  labels:
    {{- include "autodrive.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "autodrive.name" . }}
    app.kubernetes.io/component: auth
  ports:
    - name: http
      port: {{ .Values.auth.port }}
      targetPort: {{ .Values.auth.port }}
{{- end }}
