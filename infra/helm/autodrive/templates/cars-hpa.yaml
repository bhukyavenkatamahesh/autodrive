{{- if and .Values.cars.enabled .Values.cars.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "autodrive.fullname" . }}-cars
  labels:
    {{- include "autodrive.labels" . | nindent 4 }}
    app.kubernetes.io/component: cars
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "autodrive.fullname" . }}-cars
  minReplicas: {{ .Values.cars.hpa.min }}
  maxReplicas: {{ .Values.cars.hpa.max }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.cars.hpa.cpuAverage }}
{{- end }}
