version: "3.9"

# All JWT-issuing/validating services read JWT_SECRET from the shell or a
# root-level .env file (see .env.example). Everything stays in sync because
# they resolve the same variable name.

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      # NEXT_PUBLIC_ vars are inlined at build time. They must be reachable
      # from the browser, so we use localhost (not docker-internal hostnames).
      NEXT_PUBLIC_CARS_API_URL: http://localhost:8001
      NEXT_PUBLIC_AUTH_API_URL: http://localhost:4001
      NEXT_PUBLIC_REVIEWS_API_URL: http://localhost:4002
      NEXT_PUBLIC_CHATBOT_API_URL: http://localhost:8002
      NEXT_PUBLIC_ML_PRICE_API_URL: http://localhost:8003
    depends_on:
      - auth
      - cars
      - reviews

  auth:
    build:
      context: ./services/auth
    ports:
      - "4001:4001"
    environment:
      JWT_SECRET: ${JWT_SECRET:-autodrive-change-this-secret-in-production}
      PORT: "4001"

  cars:
    build:
      context: ./services/cars
    ports:
      - "8001:8001"
    environment:
      JWT_SECRET: ${JWT_SECRET:-autodrive-change-this-secret-in-production}

  reviews:
    build:
      context: ./services/reviews
    ports:
      - "4002:4002"
    environment:
      JWT_SECRET: ${JWT_SECRET:-autodrive-change-this-secret-in-production}
      PORT: "4002"
      # Points at the sentiment Function App running locally.
      SENTIMENT_API_URL: http://sentiment:7071/api/sentiment

  chatbot:
    build:
      context: ./services/chatbot
    ports:
      - "8002:8002"
    environment:
      CARS_API_URL: http://cars:8001

  ml-price:
    build:
      context: ./services/ml-price
    ports:
      - "8003:8003"

  sentiment:
    build:
      context: ./services/sentiment
    platform: linux/amd64   # Azure Functions image has no arm64 variant
    ports:
      - "7071:7071"
